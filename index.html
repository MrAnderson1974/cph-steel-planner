<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>CPH Steel Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header id="topbar">
    <div id="topbar-left">
        <img src="assets/logo_white.png" class="topbar-logo" alt="CPH Steel">
        <span class="logo-divider"></span>
        <span class="logo">PLANNER</span>
        <span id="dirty-flag" class="hidden">●</span>
    </div>
    <div id="topbar-right">
        <button id="btn-save" onclick="forceSave()" title="Ctrl+S">💾 Gem</button>
        <button id="btn-export" onclick="exportExcel()" title="Ctrl+E">📊 Excel</button>
        <button id="btn-settings" onclick="toggleSettings()">⚙ Indstillinger</button>
        <span id="save-status"></span>
    </div>
</header>

<div id="settings-panel" class="hidden">
    <div class="settings-inner">
        <h3>Indstillinger</h3>
        <label>GitHub Token (fine-grained, repo scope):
            <input type="password" id="s-token" placeholder="ghp_...">
        </label>
        <label>Repository (bruger/cph-steel-planner):
            <input type="text" id="s-repo" placeholder="dit-brugernavn/cph-steel-planner">
        </label>
        <label>Kapacitet pr. dag (timer):
            <input type="number" id="s-capacity" step="0.1" min="1" max="24" value="7.4">
        </label>
        <div class="settings-buttons">
            <button onclick="saveSettings()">Gem indstillinger</button>
            <button onclick="toggleSettings()">Luk</button>
        </div>
    </div>
</div>

<div id="kpi-bar"></div>

<div id="action-section">
    <div id="action-header" onclick="toggleActionRequired()">
        <span id="action-toggle">▼</span>
        <strong>⚠ Action Required</strong>
        <span id="action-count" class="action-badge"></span>
    </div>
    <div id="action-body"></div>
</div>

<div id="board"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/persistence.js"></script>
<script src="js/excel-export.js"></script>
<script src="js/dragdrop.js"></script>
<script src="js/app.js"></script>
</body>
</html>
